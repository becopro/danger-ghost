			function Initialize_Map_Array() {

										// Plataforma ANTES da Ilha 1
										if (c - 18 >= 0) {
											this.bitmap[r][c - 18] = 2;
											this.bitmap[r][c - 17] = 2;
										}
										// Plataforma DEPOIS da Ilha 1 (conectando com a base principal)
										if (c - 3 >= 0) {
											this.bitmap[r][c - 3] = 2;
											this.bitmap[r][c - 2] = 2;
										}
									}
									var endC = c;
									while(endC < 50 && (g_levels[25][r][endC] == 1 || g_levels[25][r][endC] == 2)) endC++;
									
									// ILHA 2 (Depois da plataforma principal)
									if (endC + 5 < 50) {
										g_activeIslands.push({ x: (endC + 5) * 24, y: r * 24, visualYOffset: OFFSET_Y, w: 240, h: 240, state: 'idle', timer: 90 });
										// Plataforma ANTES da Ilha 2 (conectando a base principal com a ilha)
										if (endC + 2 < 50) {

											this.bitmap[r][endC + 2] = 2;

										for (var platCol = endC + 16; platCol < 49; platCol += 4) {

											this.bitmap[r][platCol + 1] = 2;

											if (platCol === endC + 16 && r - 1 >= 0) {
												this.bitmap[r - 1][platCol] = 4;
											}
										}
									}
									c = endC - 1;
								}
							}
						}
					}

							}
						} else if (island.state == 'falling') {
							island.y += 5;
						}
					}
				};
			}

			function determinePos(val) { return Math.floor(val / 24); }

			function c_Boss(l_x, l_y, type) {
				this.type = type || "crow";
				this.xPos = l_x; this.yPos = l_y;
				this.lives = (this.type === "cactus") ? 9 : 4; 
				this.width = (this.type === "cactus") ? 288 : 48; 
				this.height = (this.type === "cactus") ? 288 : 48;
				this.speed = 2; this.dir = 1;
				this.alive = true;
				this.minX = l_x - 120; this.maxX = l_x + 120;

				this.draw = function () {
					if (!this.alive) return;
					var sprite;
					if (this.type === "cactus") {
						sprite = (this.dir > 0) ? cactusRight : cactusLeft;
					} else {
						sprite = (this.dir > 0) ? sickCrowLeft : sickCrowRight; // Espelhado conforme pedido
					}
					g_ctx.drawImage(sprite, this.xPos + map_offset, this.yPos, this.width, this.height);
				};

				this.update = function () {
					if (!this.alive) return;
					this.xPos += this.speed * this.dir;
					if (this.xPos > this.maxX || this.xPos < this.minX) this.dir *= -1;
					if (this.xPos < 0) { this.xPos = 0; this.dir = 1; }
					if (this.xPos > 1152) { this.xPos = 1152; this.dir = -1; }
				};
			}

					var cl = determinePos(this.xPos + 4), cr = determinePos(this.xPos + 20);
					var ct = determinePos(this.yPos), cb = determinePos(this.yPos + 23);

					if (cb >= 11) { this.alive = false; return; }

					var nodes = [cl, cr];
					for (var i = 0; i < nodes.length; i++) {
						var c = nodes[i];
						if (c < 0 || c >= 50) continue;

						if (!this.ghostMode && ct >= 0 && (map.bitmap[ct][c] == 1 || map.bitmap[ct][c] == 2 || map.bitmap[ct][c] == 13 || map.bitmap[ct][c] == 14 || map.bitmap[ct][c] == 15 || map.bitmap[ct][c] == 19)) {
							this.yPos = (ct + 1) * 24;
							if (this.jumpNum == 1) this.jumpNum = 2;
						}
						if (!this.ghostMode && cb >= 0 && cb < 11 && (map.bitmap[cb][c] == 1 || map.bitmap[cb][c] == 2 || map.bitmap[cb][c] == 13 || map.bitmap[cb][c] == 14 || map.bitmap[cb][c] == 15 || map.bitmap[cb][c] == 19)) {
							this.yPos = (cb - 1) * 24;
							this.jumpNum = 0; this.jumpCounter = 0;
							this.jumpsPerformed = 0;
						}
						if (ct >= 0 && ct < 11 && (map.bitmap[ct][c] == 5 || map.bitmap[ct][c] == 6)) this.alive = false;
						if (cb >= 0 && cb < 11 && (map.bitmap[cb][c] == 5 || map.bitmap[cb][c] == 6)) this.alive = false;

						if (ct >= 0 && ct < 11 && map.bitmap[ct][c] == 4 && this.jump) {
							if (g_boss && g_boss.alive) { /* Locked */ } else { this.nextLevel(); }
						}
						if (cb >= 0 && cb < 11 && map.bitmap[cb][c] == 4 && this.jump) {
							if (g_boss && g_boss.alive) { /* Locked */ } else { this.nextLevel(); }
						}

						var tiles = [ct, cb];
						for (var t = 0; t < tiles.length; t++) {
							var r = tiles[t];
							if (r >= 0 && r < 11) {
								var tile = map.bitmap[r][c];
								if (tile >= 7 && tile <= 12) {
									if (tile == 7) AddScore(50);
									else if (tile == 8) AddScore(100);
									else if (tile == 12) this.lives++;
									else AddScore(150);
									map.bitmap[r][c] = 0;
								}
							}
						}
					}
					
					if (!this.ghostMode) {
						var ghostRect = {l: this.xPos + 4, r: this.xPos + 20, t: this.yPos, b: this.yPos + 23};
						for (var isl = 0; isl < g_activeIslands.length; isl++) {
							var island = g_activeIslands[isl];
							if (island.state == 'falling') continue;
							var iRect = {l: island.x, r: island.x + island.w, t: island.y - island.visualYOffset, b: island.y - island.visualYOffset + island.h};
							
							if (ghostRect.r > iRect.l && ghostRect.l < iRect.r) {
								if (prevY + 23 <= iRect.t && ghostRect.b >= iRect.t) {
									this.yPos = iRect.t - 24;
									this.jumpNum = 0; this.jumpCounter = 0; this.jumpsPerformed = 0;
									if (island.state == 'idle') island.state = 'countdown';
								} else if (this.jumpNum == 1 && prevY >= iRect.b && ghostRect.t <= iRect.b) {
									this.yPos = iRect.b;
									this.jumpNum = 2;
								}
							}
						}
					}

					if (this.xPos > 200) map_offset = -(this.xPos - 200);
				};

				this.nextLevel = function () {
					if (g_currentLevel >= 33) { 
						g_globalTotalTime = Math.floor((Date.now() - g_globalStartTime) / 1000);
						StartEndCutscene();
						return; 
					}
					g_currentLevel++;
					this.xPos = 48; this.yPos = 150; map_offset = 0;
					map.loadLevel(g_currentLevel);
					this.jump = false; this.jumpNum = 0;
				};
			}

					var data = await req.json();
					var hasCoin = false;
					if (data && data.Hodlers) {
						for (var i = 0; i < data.Hodlers.length; i++) {
							var h = data.Hodlers[i];
							if (h.HODLerPublicKeyBase58Check === pubKey && h.BalanceNanos > 0) {
								hasCoin = true;
								break;
							}
						}
					}
					if (hasCoin) {
						g_hasCreatorCoin = true;
						console.log("VIP Access Granted: DangerGhost HODLer!");
					} else {
						g_hasCreatorCoin = false;
						console.log("VIP Access Denied: Not a DangerGhost HODLer.");
					}
				} catch(e) { 
					console.log("VIP Check Error", e);
					g_hasCreatorCoin = false;
				}
			}

			window.addEventListener('message', function(event) {
				if (event.origin !== "https://identity.deso.org") return;
				var data = event.data;
				
				if (data.method === "initialize") {
					event.source.postMessage({ id: data.id, service: "identity" }, "https://identity.deso.org");
				}
				
				if (g_desoPendingAction === 'login' && data.method === "login") {
					for (var key in data.payload.users) {
						g_desoPublicKey = key; 
						g_desoUserObj = data.payload.users[key];
						break;
					}
					if (g_desoPublicKey) {
						document.getElementById("desoBtn").innerText = "LOGGED IN: " + g_desoPublicKey.substring(0,8) + "...";
						document.getElementById("desoBtn").style.borderColor = "#00FF00";
						document.getElementById("desoBtn").style.color = "#00FF00";
						if (g_desoIdentityWindow) g_desoIdentityWindow.close();
						g_desoPendingAction = null;
						CheckVIPStatus(g_desoPublicKey);
					}
				}
				
				// O JWT payload tem formato diferente: payload.jwt
				if (g_desoPendingAction === 'jwt' && data.payload && typeof data.payload === "string") {
					if (g_desoIdentityWindow) g_desoIdentityWindow.close();
					g_desoPendingAction = null;
					ExecuteDeSoPost(data.payload);
				} else if (g_desoPendingAction === 'jwt' && data.payload && data.payload.jwt) {
					if (g_desoIdentityWindow) g_desoIdentityWindow.close();
					g_desoPendingAction = null;
					ExecuteDeSoPost(data.payload.jwt);
				}
				
				if (data.payload && data.payload.signedTransactionHex) {
					// Se o DeSo Identity já efetuou o broadcast automático com sucesso e retornou o hash,
					// nós consumimos diretamente para evitar colisões redundantes de mempool!
					if (data.payload.txnHashHex) {
						var txHash = data.payload.txnHashHex;
						if (g_desoPendingTransactionType === "POST" || g_desoPendingTransactionType === "SUBMITTING_POST") {
							g_desoPendingTransactionType = null;
							g_desoLastPostHashHex = txHash;
							if (g_desoIdentityWindow) g_desoIdentityWindow.close();
							
							var btn = document.getElementById("desoPostBtn");
							if (btn) {
								btn.innerText = "MINT NFT";
								btn.disabled = false;
								btn.onclick = function() {
									btn.innerText = "MINTING... PLEASE WAIT";
									btn.disabled = true;
									CreateDeSoNFT(g_desoLastPostHashHex);
								};
							}
						} else if (g_desoPendingTransactionType === "NFT" || g_desoPendingTransactionType === "SUBMITTING_NFT") {
							g_desoPendingTransactionType = null;
							if (g_desoIdentityWindow) g_desoIdentityWindow.close();
							
							var btn = document.getElementById("desoPostBtn");
							if (btn) {
								btn.innerText = "SUCCESS! POSTED & MINTED";
								btn.disabled = true;
							}
							alert("🏆 BINGO! Your Win Screenshot was MINTED as a unique NFT directly into your DeSo Wallet! Welcome to Web3.");
						}
					} else {
						// Fallback resiliente: caso o Identity não tenha auto-transmitido,
						// nós enviamos a transação assinada manualmente pelo nó DeSo
						if (g_desoPendingTransactionType === "POST") g_desoPendingTransactionType = "SUBMITTING_POST";
						else if (g_desoPendingTransactionType === "NFT") g_desoPendingTransactionType = "SUBMITTING_NFT";
						SubmitSignedTransaction(data.payload.signedTransactionHex);
					}
				}
			});

			function LoginDeSo() {
				g_desoPendingAction = 'login';
				g_desoIdentityWindow = window.open("https://identity.deso.org/log-in?accessLevelRequest=2", "deso_identity", "width=800,height=1000");
			}

			function PostToDeSo() {
				if (!g_desoPublicKey) {
					alert("Please LOGIN TO DESO on the Start Screen before posting your score!");
					return;
				}
				var nameInput = document.getElementById("playerNameInput");
				var pName = nameInput.value.trim() || "UNKNOWN";
				DrawWinScreen(pName); // Estampa o nome
				
				var btn = document.getElementById("desoPostBtn");
				if(btn) { btn.innerText = "UPLOADING... PLEASE WAIT"; btn.disabled = true; }
				
				g_desoPendingAction = 'jwt';
				var iframe = document.getElementById("identityIframe");
				var jwtPayload = {};
				if (g_desoUserObj) {
					jwtPayload = {
						accessLevel: g_desoUserObj.accessLevel,
						accessLevelHmac: g_desoUserObj.accessLevelHmac,
						encryptedSeedHex: g_desoUserObj.encryptedSeedHex
					};
				}
				iframe.contentWindow.postMessage({
					id: "get_jwt",
					service: "identity",
					method: "jwt",
					payload: jwtPayload
				}, "https://identity.deso.org");
			}

			async function ExecuteDeSoPost(jwt) {
				// Validação Anti-Tamper de Memória (Shadow State Check)
				if (btoa(g_score + _antiCheat.salt) !== _antiCheat.hash) {
					alert("⚠️ SECURITY ALERT: Memory manipulation detected! Score has been tampered with.");
					return;
				}
				
				// Validação Temporal (Sanity Check)
				var maxScore = g_globalTotalTime * 500; 
				if (g_score > maxScore) {
					alert("⚠️ SECURITY ALERT: Impossible Score/Time ratio! Speedhack detected.");
					return;
				}
				
				g_canvas.toBlob(async function(blob) {
					try {
						var formData = new FormData();
						formData.append("file", blob, "DangerGhost_Clear.jpg");
						formData.append("UserPublicKeyBase58Check", g_desoPublicKey);
						formData.append("JWT", jwt);

						var uploadRes = await fetch("https://node.deso.org/api/v0/upload-image", {
							method: "POST",
							body: formData
						});
						var uploadData = await uploadRes.json();
						var imageUrl = uploadData.ImageURL;

						var mins = Math.floor(g_globalTotalTime / 60);
						var secs = g_globalTotalTime % 60;
						var timeStr = mins + ":" + secs.toString().padStart(2, '0');
						
						var nameInput = document.getElementById("playerNameInput");
						var pName = nameInput.value.trim() || "UNKNOWN";
						var newPName = pName.substring(0, 15).trim();
						
						if (!g_leaderboardList) g_leaderboardList = [];
						var foundMe = false;
						for (var k = 0; k < g_leaderboardList.length; k++) {
							if (g_leaderboardList[k].name === newPName) {
								if (g_score > g_leaderboardList[k].score) g_leaderboardList[k].score = g_score;
								foundMe = true; break;
							}
						}
						if (!foundMe) g_leaderboardList.push({ name: newPName, score: g_score });
						
						g_leaderboardList.sort(function(a,b) { return b.score - a.score; });
						g_leaderboardList = g_leaderboardList.slice(0, 10);
						
						var top10Text = "\n\n🏆 DANGER GHOST GLOBAL TOP 10 🏆\n";
						for (var i = 0; i < g_leaderboardList.length; i++) {
							top10Text += (i+1) + ". " + g_leaderboardList[i].name + " - " + g_leaderboardList[i].score + " pts\n";
						}

						var bodyText = "🎮 I just conquered DANGER GHOST!\n\nGhost Hunter: " + pName + "\nScore: " + g_score + "\nTime: " + timeStr + top10Text + "\n#DangerGhost #Web3Gaming #DeSo";
						
						var postReq = {
							UpdaterPublicKeyBase58Check: g_desoPublicKey,
							BodyObj: {
								Body: bodyText,
								ImageURLs: [imageUrl]
							},
							MinFeeRateNanosPerKB: 1000
						};

						var postRes = await fetch("https://node.deso.org/api/v0/submit-post", {
							method: "POST",
							headers: { "Content-Type": "application/json" },
							body: JSON.stringify(postReq)
						});
						var postData = await postRes.json();
						
						if (postData.TransactionHex && postData.PostHashHex) {
							var btn = document.getElementById("desoPostBtn");
							if(btn) { 
								btn.innerText = "APPROVE POST"; 
								btn.disabled = false; 
								btn.onclick = function() {
									g_desoPendingTransactionHex = postData.TransactionHex;
									g_desoLastPostHashHex = postData.PostHashHex;
									g_desoPendingTransactionType = "POST";
									g_desoIdentityWindow = window.open("https://identity.deso.org/approve?tx=" + postData.TransactionHex, "deso_identity", "width=800,height=1000");
									btn.innerText = "WAITING FOR APPROVAL...";
									btn.disabled = true;
									WaitForWindowClose(g_desoIdentityWindow, function() {
										if (g_desoPendingTransactionType === "POST") {
											btn.innerText = "APPROVE POST";
											btn.disabled = false;
										}
									});
								};
							}
							DrawWinScreen(); 
						} else {
							var btn = document.getElementById("desoPostBtn");
							if(btn) { btn.innerText = "ERROR! SEE CONSOLE"; }
							console.error("Unexpected DeSo response", postData);
							alert("Error: Unexpected DeSo response format. Check console.");
							DrawWinScreen(); 
						}
					} catch(e) {
						console.error("DeSo Error", e);
						alert("Error posting to DeSo. Check console.");
						var btn = document.getElementById("desoPostBtn");
						if(btn) { btn.innerText = "POST TO DESO"; btn.disabled = false; }
						DrawWinScreen(); 
					}
				}, "image/jpeg", 0.95);
			}

			function StartEndCutscene() {
				g_gameState = G_END_CUTSCENE;
				var gif = document.getElementById("cutsceneGif");
				gif.src = "";
				gif.src = "assets/sprites/Dream 36 (1).gif"; // GIF de Encerramento
				gif.style.display = "block";
				g_cutsceneTimer = setTimeout(FinishEndCutscene, 16000); // 16 segundos
			}

			function FinishEndCutscene() {
				if (g_gameState != G_END_CUTSCENE) return;
				clearTimeout(g_cutsceneTimer);
				var gif = document.getElementById("cutsceneGif");
				gif.style.display = "none";
				g_gameState = G_WIN;
			}

			function ResetGame(l) {
				g_globalStartTime = Date.now();
				g_currentLevel = l || 1; g_score = 0; map_offset = 0;
				_antiCheat.hash = btoa("0" + _antiCheat.salt);
				DeSoGhost.lives = 3; DeSoGhost.alive = true;
				DeSoGhost.xPos = 48; DeSoGhost.yPos = 150;
				DeSoGhost.jumpNum = 0; DeSoGhost.jumpCounter = 0;
				DeSoGhost.jumpsPerformed = 0; explosionFrame = 0;
				g_boss = null;
				map.loadLevel(g_currentLevel); g_gameState = G_PLAY;
			}

			// --- INITIALIZATION ---
			var map = new Initialize_Map_Array();
			var DeSoGhost = new c_DeSoGhost(48, 150);

			// Matrix Background for Level 26
			var g_binaryBits = [];
			for (var i = 0; i < 60; i++) {
				g_binaryBits.push({
					x: Math.random() * 640,
					y: Math.random() * 300,
					speed: 1 + Math.random() * 4,
					val: Math.floor(Math.random() * 2)
				});
			}

			function UpdateAndDrawBinaryBackground(isStartScreen) {
				if (g_currentLevel != 26 && !isStartScreen) return;
				g_ctx.font = isStartScreen ? "bold 14px 'Courier New'" : "14px 'Courier New'";
				g_ctx.fillStyle = isStartScreen ? "#00FF00" : "#003800";
				for (var i = 0; i < g_binaryBits.length; i++) {
					var b = g_binaryBits[i];
					g_ctx.fillText(b.val, b.x, b.y);
					b.y += b.speed;
					if (b.y > 300) { b.y = 0; b.x = Math.random() * 640; }
				}
			}

			function Game_Loop() {
				g_ctx.clearRect(0, 0, g_canvas.width, g_canvas.height);
				
				// Ocultar ou mostrar o botão DeSo dependendo do estado do jogo
				var btn = document.getElementById("desoBtn");
				if (btn) btn.style.display = (g_gameState == G_START || g_gameState == G_WIN) ? "inline-block" : "none";
				
				var winPanel = document.getElementById("winPanel");
				if (winPanel) winPanel.style.display = (g_gameState == G_WIN) ? "block" : "none";

				if (g_gameState == G_START) DrawStartScreen();
				else if (g_gameState == G_CUTSCENE || g_gameState == G_END_CUTSCENE) {
					// Tela preta de fundo pro Canvas enquanto o GIF toca pelo DOM
					g_ctx.fillStyle = "#000"; g_ctx.fillRect(0, 0, g_canvas.width, g_canvas.height);
				}
				else if (g_gameState == G_PLAY) {
					var elapsed = Math.floor((Date.now() - g_levelStartTime) / 1000);
					g_timeRemaining = 240 - elapsed;
					if (g_timeRemaining <= 0 && DeSoGhost.alive) {
						g_timeRemaining = 0;
						DeSoGhost.alive = false;
						DeSoGhost.lives = 0; // Força Opção B (Game Over absoluto após a explosão)
					}

					UpdateAndDrawBinaryBackground(false);
					map.draw(); map.updateMap();
					if (g_boss) { g_boss.update(); g_boss.draw(); }
					DeSoGhost.move(); DeSoGhost.draw(); Print_HUD();
				}
				else if (g_gameState == G_WIN) DrawWinScreen();
				else if (g_gameState == G_GAMEOVER) DrawGameOverScreen();
				else if (g_gameState == G_PAUSE) {
					UpdateAndDrawBinaryBackground(false);
					map.draw();
					if (g_boss) { g_boss.draw(); }
					DeSoGhost.draw(); Print_HUD();
					
					g_ctx.fillStyle = "rgba(0,0,0,0.7)"; g_ctx.fillRect(0, 0, g_canvas.width, g_canvas.height);
					g_ctx.font = "bold 40px 'Courier New'"; g_ctx.fillStyle = "#FF00FF"; g_ctx.textAlign = "center";
					g_ctx.fillText("PAUSED", g_canvas.width / 2, 140);
					g_ctx.font = "bold 20px 'Courier New'"; g_ctx.fillStyle = "#FFF";
					g_ctx.fillText("PRESS SPACE TO RESUME", g_canvas.width / 2, 180);
					g_ctx.textAlign = "left"; 
				}
			}

			var g_gameInterval = setInterval(Game_Loop, 33);
			var g_isFast = false;

			window.addEventListener("keydown", function (e) {
				if (document.activeElement && document.activeElement.tagName === "INPUT") return;
				
				if (!g_musicStarted) {
					bgMusic.play().catch(function(err){});
					g_musicStarted = true;
				}
				if (e.keyCode == 82 && !g_isFast) {
					g_isFast = true;
					clearInterval(g_gameInterval);
					g_gameInterval = setInterval(Game_Loop, 16);
				}
				if (e.keyCode == 32) { 
					if (g_gameState == G_START) {
						StartCutscene();
					} else if (g_gameState == G_CUTSCENE) {
						EndCutscene();
					} else if (g_gameState == G_END_CUTSCENE) {
						FinishEndCutscene();
					} else if (g_gameState == G_PLAY) {
						g_gameState = G_PAUSE;
						g_pauseStartTime = Date.now();
					} else if (g_gameState == G_PAUSE) {
						g_gameState = G_PLAY;
						g_levelStartTime += (Date.now() - g_pauseStartTime);
					} else { 
						ResetGame(); 
					} 
				}
				if (e.keyCode == 80) { // P
					if (g_gameState == G_PLAY) {
						g_gameState = G_PAUSE;
						g_pauseStartTime = Date.now();
					} else if (g_gameState == G_PAUSE) {
						g_gameState = G_PLAY;
						g_levelStartTime += (Date.now() - g_pauseStartTime);
					} else if (g_gameState == G_START) {
						// Bypass inteligente de VIP em desenvolvimento local ou staging para facilitar testes
						var isLocal = window.location.hostname === "localhost" || 
									  window.location.hostname === "127.0.0.1" || 
									  window.location.protocol === "file:";
									  
						if (!g_hasCreatorCoin && !isLocal) {
							alert("⚠️ ACCESS DENIED (TOKEN-GATING): This feature is exclusively for $DangerGhost Coin Holders! Buy our Creator Coin on DeSo with your logged in wallet to unlock Passwords.");
							return;
						}
						var pw = prompt("ENTER VIP PASSWORD");
						if (pw) {
							if (pw.toLowerCase() === "matrix") { ResetGame(26); }
							else if (pw.toLowerCase() === "becopro") { ResetGame(29); }
							else if (pw.toLowerCase() === "maximo") { ResetGame(33); }
						}
					}
				}
				if (e.keyCode == 65 || e.keyCode == 37) DeSoGhost.moveLeft = true;
				if (e.keyCode == 68 || e.keyCode == 39) DeSoGhost.moveRight = true;
				if (e.keyCode == 87 || e.keyCode == 38) DeSoGhost.jump = true;
				if (e.keyCode == 70) DeSoGhost.ghostMode = true;
			});
			window.addEventListener("keyup", function (e) {
				if (e.keyCode == 82 && g_isFast) {
					g_isFast = false;
					clearInterval(g_gameInterval);
					g_gameInterval = setInterval(Game_Loop, 33);
				}
				if (e.keyCode == 65 || e.keyCode == 37) DeSoGhost.moveLeft = false;
				if (e.keyCode == 68 || e.keyCode == 39) DeSoGhost.moveRight = false;
				if (e.keyCode == 87 || e.keyCode == 38) DeSoGhost.jump = false;
				if (e.keyCode == 70) DeSoGhost.ghostMode = false;
			});

			// Expõe os botões para o HTML
			window.LoginDeSo = LoginDeSo;
			window.PostToDeSo = PostToDeSo;
			window.DownloadScreenshot = DownloadScreenshot;
			window.ToggleMute = ToggleMute;
			})(); // Fecha IIFE Caixa Preta
		</script>
	</div>
